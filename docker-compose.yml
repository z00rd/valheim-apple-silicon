# DOCELOWY compose dla Opcji 1 (Tailscale na HOŚCIE Maca, NIE w VM).
# Patrz ROADMAP.md → "Opcja 1". Cutover: zatrzymaj stack na starym compose, podmień plik,
# podnieś. Węzłem tailnetu staje się sam Mac (easy NAT ASUS) → direct P2P do Jaśka.
#
# RÓŻNICE vs docker-compose.yml:
#  - usunięty sidecar `tailscale` (węzeł TS przenosi się na host macOS),
#  - valheim NIE współdzieli już netns; publikuje porty UDP, które Colima forwarduje na host,
#  - Tailscale na hoście serwuje te porty pod adresem 100.x Maca (subnet-route jako fallback).
#
# UWAGA (jedyne ryzyko): forward UDP przez Lima/Colima. Jeśli gra nie łapie połączenia mimo
# `direct` w `tailscale ping` → fallback subnet-route (ROADMAP.md, sekcja "Ryzyko / fallback").

services:
  valheim:
    image: ghcr.io/lloesche/valheim-server:latest
    container_name: valheim
    restart: unless-stopped
    stop_grace_period: 2m               # czas na zapis świata przy zatrzymaniu
    cap_add:
      - SYS_NICE
    security_opt:
      - seccomp=unconfined              # known SteamCMD seccomp bug
    ports:
      - "2456:2456/udp"                 # gra
      - "2457:2457/udp"                 # Steam query / A2S
    volumes:
      - valheim-config:/config          # świat + backupy (worlds_local, backups)
      - valheim-server:/opt/valheim     # pliki serwera (żeby nie pobierać ponownie)
    environment:
      SERVER_NAME: ${SERVER_NAME:?Ustaw SERVER_NAME w .env}
      WORLD_NAME: ${WORLD_NAME:?Ustaw WORLD_NAME w .env}
      SERVER_PASS: ${SERVER_PASS:?Ustaw SERVER_PASS w .env (min. 5 znaków)}
      SERVER_PUBLIC: "false"
      SERVER_PORT: "2456"
      TZ: ${TZ:-Europe/Warsaw}
      BACKUPS: "true"
      BACKUPS_CRON: "0 */6 * * *"
      BACKUPS_MAX_COUNT: "12"
      BACKUPS_IF_IDLE: "false"
      UPDATE_CRON: "*/15 * * * *"
      UPDATE_IF_IDLE: "true"
      RESTART_IF_IDLE: "true"
      STEAMCMD_ARGS: ""                 # bez 'validate' = szybki restart

volumes:
  valheim-config:
  valheim-server:
