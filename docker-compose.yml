# Compose for the "Tailscale on the HOST" architecture (direct P2P for remote players).
# Tailscale runs on macOS itself (easy NAT), NOT in the VM — see ARCHITECTURE.md.
# The container publishes the game's UDP ports; the host→VM bridge is set up by
# scripts/host-ts-bridge.sh (udp-proxy.py), because Lima doesn't forward UDP. Tailscale on the
# host exposes them at the node's 100.x address.
#
# The simple variant with the old in-VM Tailscale sidecar (laggy for remote players) is in
# docker-compose.sidecar.yml.

services:
  valheim:
    image: ghcr.io/lloesche/valheim-server:latest
    container_name: valheim
    restart: unless-stopped
    stop_grace_period: 2m               # time to save the world on shutdown
    cap_add:
      - SYS_NICE
    security_opt:
      - seccomp=unconfined              # known SteamCMD seccomp bug
    ports:
      - "2456:2456/udp"                 # game
      - "2457:2457/udp"                 # Steam query / A2S
    volumes:
      - valheim-config:/config          # world + backups (worlds_local, backups)
      - valheim-server:/opt/valheim     # server files (so we don't re-download)
    environment:
      SERVER_NAME: ${SERVER_NAME:?Set SERVER_NAME in .env}
      WORLD_NAME: ${WORLD_NAME:?Set WORLD_NAME in .env}
      SERVER_PASS: ${SERVER_PASS:?Set SERVER_PASS in .env (min. 5 chars)}
      SERVER_PUBLIC: "false"
      SERVER_PORT: "2456"
      TZ: ${TZ:-Europe/Warsaw}
      BACKUPS: "true"
      BACKUPS_CRON: "0 */6 * * *"
      BACKUPS_MAX_COUNT: "12"
      BACKUPS_IF_IDLE: "false"
      UPDATE_CRON: "*/15 * * * *"
      UPDATE_IF_IDLE: "true"
      RESTART_IF_IDLE: "true"
      STEAMCMD_ARGS: ""                 # no 'validate' = fast restart
volumes:
  valheim-config:
  valheim-server:
